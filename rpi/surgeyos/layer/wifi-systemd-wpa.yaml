# METABEGIN
# X-Env-Layer-Name: wifi-systemd-wpa
# X-Env-Layer-Category: net
# X-Env-Layer-Desc: Configure wlan0 using wpa_supplicant + systemd-networkd from env vars.
# X-Env-Layer-Requires: systemd-net-min-ubuntu
#
# X-Env-VarPrefix: wifi
# X-Env-Var-ssid: ''
# X-Env-Var-ssid-Desc: Wi-Fi SSID for wlan0 (leave empty to skip Wi-Fi setup).
# X-Env-Var-ssid-Required: n
# X-Env-Var-ssid-Set: y
# X-Env-Var-psk: ''
# X-Env-Var-psk-Desc: Wi-Fi passphrase (WPA2/WPA3-PSK).
# X-Env-Var-psk-Required: n
# X-Env-Var-psk-Set: y
# X-Env-Var-country: US
# X-Env-Var-country-Desc: Wi-Fi regulatory domain country code (ISO 3166-1 alpha-2).
# X-Env-Var-country-Required: n
# X-Env-Var-country-Set: y
# METAEND

mmdebstrap:
  packages:
    - wpasupplicant
    - wireless-regdb
    - iw
    - rfkill
  customize-hooks:
    - |
      set -e
      if [ -z "${IGconf_wifi_ssid:-}" ]; then
        echo "wifi-systemd-wpa: IGconf_wifi_ssid is empty; skipping Wi-Fi setup"
        exit 0
      fi

      install -d "$1/etc/systemd/network" "$1/etc/wpa_supplicant" "$1/etc/systemd/system"

      export WIFI_SSID="${IGconf_wifi_ssid}"
      export WIFI_PSK="${IGconf_wifi_psk:-}"
      export WIFI_COUNTRY="${IGconf_wifi_country:-US}"

      # systemd-networkd config for DHCP on wlan0
      printf '%s\n' \
        '[Match]' \
        'Name=wlan0' \
        '' \
        '[Network]' \
        'DHCP=yes' \
        > "$1/etc/systemd/network/10-wlan0.network"

      # wpa_supplicant config for wlan0
      printf '%s\n' \
        'ctrl_interface=DIR=/run/wpa_supplicant GROUP=netdev' \
        'update_config=1' \
        "country=${WIFI_COUNTRY}" \
        '' \
        'network={' \
        "    ssid=\"${WIFI_SSID}\"" \
        "    psk=\"${WIFI_PSK}\"" \
        '}' \
        > "$1/etc/wpa_supplicant/wpa_supplicant-wlan0.conf"

      # Use systemd-resolved stub resolver for DHCP-provided DNS.
      ln -sf /run/systemd/resolve/stub-resolv.conf "$1/etc/resolv.conf"

      # Unblock Wi-Fi radios at boot; some devices boot with rfkill engaged.
      cat > "$1/etc/systemd/system/rfkill-unblock-wifi.service" <<'EOF'
      [Unit]
      Description=Unblock Wi-Fi via rfkill
      DefaultDependencies=no
      Before=network-pre.target
      Wants=network-pre.target

      [Service]
      Type=oneshot
      ExecStart=/usr/sbin/rfkill unblock wifi

      [Install]
      WantedBy=multi-user.target
      EOF

      # Enable networking stack + Wi-Fi services.
      $BDEBSTRAP_HOOKS/enable-units "$1" systemd-resolved systemd-networkd wpa_supplicant@wlan0 rfkill-unblock-wifi
