# METABEGIN
# X-Env-Layer-Name: ubuntu-jammy-minbase
# X-Env-Layer-Category: base
# X-Env-Layer-Desc: Minimal Ubuntu 22.04 (Jammy) base filesystem built with mmdebstrap.
# X-Env-Layer-Requires: systemd-net-min-ubuntu,rpi-user-credentials
#
# X-Env-VarPrefix: ubuntu
# X-Env-Var-mirror: http://ports.ubuntu.com/ubuntu-ports
# X-Env-Var-mirror-Desc: Base Ubuntu mirror for arm64 (ports).
# X-Env-Var-mirror-Required: n
# X-Env-Var-mirror-Set: y
# METAEND

mmdebstrap:
  mode: unshare
  variant: minbase
  suite: jammy
  components:
    - main
    - universe
    - multiverse
    - restricted
  mirrors:
    - http://ports.ubuntu.com/ubuntu-ports
  packages:
    # basic OS + networking + tools
    - ubuntu-minimal
    - ca-certificates
    - curl
    - gnupg
    - netplan.io
    - iproute2
    - iputils-ping
    - openssh-server
    - sudo
    - systemd
    - systemd-sysv
    - locales
    - tzdata
    - udev
    - kmod
  customize-hooks:
    - |
      set -e
      # Locale defaults (override via device layer if desired)
      chroot $1 sh -c "sed -i 's/^# *en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen && locale-gen || true"
      chroot $1 sh -c "update-locale LANG=en_US.UTF-8 || true"
    - |
      set -e
      # Ensure SSH is enabled on first boot and password login works for the provisioned user.
      $BDEBSTRAP_HOOKS/enable-units "$1" ssh
      cat > "$1/etc/systemd/system/ssh-hostkeys.service" <<'EOF'
      [Unit]
      Description=Generate SSH host keys if missing
      Before=ssh.service

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/ssh-keygen -A

      [Install]
      WantedBy=multi-user.target
      EOF
      install -d "$1/etc/systemd/system/ssh.service.d"
      cat > "$1/etc/systemd/system/ssh.service.d/10-hostkeys.conf" <<'EOF'
      [Unit]
      Wants=ssh-hostkeys.service
      After=ssh-hostkeys.service
      EOF
      install -d "$1/etc/ssh/sshd_config.d"
      cat > "$1/etc/ssh/sshd_config.d/99-password-auth.conf" <<'EOF'
      PasswordAuthentication yes
      KbdInteractiveAuthentication no
      UsePAM yes
      EOF
      $BDEBSTRAP_HOOKS/enable-units "$1" ssh-hostkeys
    - |
      set -e
      # Ensure /boot/firmware exists for boot partition mounting conventions
      mkdir -p "$1/boot/firmware"
